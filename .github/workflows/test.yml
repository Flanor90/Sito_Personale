name: Test

on:
  push:
    branches: [main, "claude/**"]
  pull_request:

jobs:
  unit:
    name: Test unitari (quiz-core)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Esegui la suite di test
        run: node --test
